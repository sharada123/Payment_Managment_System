{% extends 'base.html' %}

{% block content %}

<h3>{{ customer.name }}</h3>

<p>
Remaining:
<b>{{ customer.remaining_payment }}</b>
</p>

<form method="post">

    {% csrf_token %}

    <input type="number"
           step="0.01"
           name="amount"
           class="form-control">

    <br>

    <button class="btn btn-success">
        Add Payment
    </button>

</form>

{% endblock %}
