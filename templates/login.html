{% extends 'base.html' %}

{% block content %}

<div class="col-md-5 mx-auto">

<div class="form-card">

<h2>Login</h2>

<form method="post">

{% csrf_token %}

<input
type="text"
name="username"
placeholder="Username"
class="form-control mb-3">

<input
type="password"
name="password"
placeholder="Password"
class="form-control mb-3">

<button class="btn btn-success">
Login
</button>

</form>

<p class="mt-3">

Don't have account?

<a href="{% url 'register' %}">
Register
</a>

</p>

</div>

</div>

{% endblock %}
