
{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="form-card dashboard">

            <h2 class="text-center mb-4">
                DASHBOARD
            </h2>

            

        </div>
        <div class="row mb-4">

    <div class="col-md-6">

        <div class="card shadow border-0 dashboard-card mt-5">

            <div class="card-body text-center">

                <h5 class="text-danger fw-bold">
                    Pending Customers
                </h5>

                <h2 class="text-danger fw-bold">

            </div>

        </div>

    </div>

    <div class="col-md-6">

        <div class="card shadow border-0 dashboard-card mt-5">

            <div class="card-body text-center">

                <h5 class="text-primary fw-bold">
                    Total Pending Amount
                </h5>

                <h2 class="fw-bold">

            </div>

        </div>

    </div>

</div>

    </div>
