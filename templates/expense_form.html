{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="form-card">

            <h2 class="text-center mb-4">
                Add Expense / Loan
            </h2>

            <form method="post">

                {% csrf_token %}

                {{ form.as_p }}

                <button type="submit"
                        class="btn btn-success w-100 fw-bold">

                    Save

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
