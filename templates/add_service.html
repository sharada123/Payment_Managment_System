{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="form-card">

            <h3 class="text-center mb-4">
                Add Service
            </h3>

            <h5 class="mb-3">
                Customer:
                {{ customer.name }}
            </h5>

            <form method="post">

                {% csrf_token %}

                {{ form.as_p }}

                <button
                    type="submit"
                    class="btn btn-success w-100 fw-bold">

                    Add Service

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
