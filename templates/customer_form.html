{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="form-card">

            <h2 class="text-center mb-4">
                Add Customer
            </h2>

            <form method="post">

                {% csrf_token %}

                {{ form.as_p }}

                <div class="text-center">

                    <button type="submit"
                            class="btn btn-primary px-4 fw-bold">
                        Save Customer
                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
